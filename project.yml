name: Huggy
options:
  bundleIdPrefix: com.charliekrug
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    version: 10.29.0

targets:
  Huggy:
    type: application
    platform: iOS
    sources:
      - Huggy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.charliekrug.huggy
        INFOPLIST_FILE: Huggy/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        DEVELOPMENT_TEAM: S6FSYG26T8
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: false
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
        Release:
          CODE_SIGN_IDENTITY: "Apple Development"
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseFirestore
      - package: Firebase
        product: FirebaseMessaging
    entitlements:
      path: Huggy/Huggy.entitlements
      properties:
        com.apple.developer.applesignin:
          - Default
        com.apple.developer.associated-domains:
          - "applinks:huggy.page.link"
        aps-environment: development
